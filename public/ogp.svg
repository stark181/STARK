<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E9D5FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- 装飾円 -->
  <circle cx="1050" cy="80" r="180" fill="white" opacity="0.06" />
  <circle cx="150" cy="550" r="200" fill="black" opacity="0.08" />
  <circle cx="980" cy="500" r="120" fill="white" opacity="0.04" />

  <!-- ロゴエリア -->
  <rect x="80" y="72" width="48" height="48" rx="12" fill="white" opacity="0.2" />
  <text x="104" y="105" font-family="sans-serif" font-size="28" fill="white" text-anchor="middle">🐝</text>
  <text x="148" y="105" font-family="'Helvetica Neue', sans-serif" font-size="22" font-weight="700" fill="white" opacity="0.9">AIプロンプト図鑑</text>

  <!-- メインキャッチ -->
  <text x="80" y="240" font-family="'Helvetica Neue', sans-serif" font-size="64" font-weight="900" fill="white" letter-spacing="-1">AIプロンプト一覧</text>

  <!-- サブキャッチ -->
  <text x="80" y="320" font-family="'Helvetica Neue', sans-serif" font-size="32" fill="white" opacity="0.85">ChatGPT・Claude・Gemini 対応</text>
  <text x="80" y="368" font-family="'Helvetica Neue', sans-serif" font-size="32" fill="white" opacity="0.85">実践プロンプト図鑑</text>

  <!-- 区切り線 -->
  <rect x="80" y="410" width="120" height="4" rx="2" fill="white" opacity="0.5" />

