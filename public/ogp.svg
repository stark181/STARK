  <rect x="80" y="448" width="220" height="56" rx="28" fill="white" opacity="0.15" />
  <text x="190" y="483" font-family="'Helvetica Neue', sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="600">55件以上のプロンプト</text>

  <rect x="320" y="448" width="220" height="56" rx="28" fill="white" opacity="0.15" />
  <text x="430" y="483" font-family="'Helvetica Neue', sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="600">成功事例レビュー付き</text>

  <rect x="560" y="448" width="200" height="56" rx="28" fill="white" opacity="0.15" />
  <text x="660" y="483" font-family="'Helvetica Neue', sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="600">コピペですぐ使える</text>

  <!-- URL -->
  <text x="80" y="580" font-family="'Helvetica Neue', sans-serif" font-size="22" fill="white" opacity="0.6">starkinc.work</text>
